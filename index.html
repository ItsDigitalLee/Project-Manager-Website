<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Lee — More capacity. Less chaos.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --green: #00C870;
      --black: #000000;
      --white: #ffffff;
      --text-secondary: rgba(255,255,255,0.65);
    }

    html, body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── GRADIENT ORBS ── */
    .orb-wrap {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0;
      animation: orbFadeIn 1.6s ease forwards;
    }

    .orb-1 {
      width: 520px;
      height: 420px;
      background: radial-gradient(ellipse at center, rgba(0,200,112,0.45) 0%, rgba(0,200,112,0.08) 60%, transparent 80%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      animation-name: orbFadeIn, drift1;
      animation-duration: 1.6s, 18s;
      animation-delay: 0s, 1.6s;
      animation-timing-function: ease, ease-in-out;
      animation-fill-mode: forwards, none;
      animation-iteration-count: 1, infinite;
    }

    .orb-2 {
      width: 360px;
      height: 300px;
      background: radial-gradient(ellipse at center, rgba(0,200,112,0.20) 0%, transparent 70%);
      top: 30%;
      left: 35%;
      animation-name: orbFadeIn, drift2;
      animation-duration: 2s, 22s;
      animation-delay: 0.4s, 2s;
      animation-timing-function: ease, ease-in-out;
      animation-fill-mode: forwards, none;
      animation-iteration-count: 1, infinite;
    }

    .orb-3 {
      width: 280px;
      height: 260px;
      background: radial-gradient(ellipse at center, rgba(0,200,112,0.12) 0%, transparent 70%);
      bottom: 28%;
      right: 30%;
      animation-name: orbFadeIn, drift3;
      animation-duration: 2.4s, 26s;
      animation-delay: 0.6s, 2.4s;
      animation-timing-function: ease, ease-in-out;
      animation-fill-mode: forwards, none;
      animation-iteration-count: 1, infinite;
    }

    @keyframes orbFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes drift1 {
      0%   { transform: translate(-50%, -60%); }
      33%  { transform: translate(-48%, -64%); }
      66%  { transform: translate(-52%, -57%); }
      100% { transform: translate(-50%, -60%); }
    }

    @keyframes drift2 {
      0%   { transform: translate(0, 0); }
      40%  { transform: translate(24px, -18px); }
      75%  { transform: translate(-16px, 14px); }
      100% { transform: translate(0, 0); }
    }

    @keyframes drift3 {
      0%   { transform: translate(0, 0); }
      35%  { transform: translate(-20px, 16px); }
      70%  { transform: translate(18px, -12px); }
      100% { transform: translate(0, 0); }
    }

    /* ── CONTENT ── */
    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 0 24px;
    }

    .hero-headline {
      font-family: 'Onest', sans-serif;
      font-weight: 700;
      font-size: clamp(2.6rem, 6vw, 4.6rem);
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(22px);
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
    }

    .hero-sub {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: clamp(0.95rem, 1.8vw, 1.125rem);
      line-height: 1.65;
      color: var(--text-secondary);
      max-width: 580px;
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.75s forwards;
    }

    /* ── CTA BUTTON ── */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--white);
      color: var(--black);
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      text-decoration: none;
      padding: 10px 22px 10px 10px;
      border-radius: 999px;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 1s forwards;
    }

    .cta-btn:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 32px rgba(0,200,112,0.25);
    }

    .cta-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      flex-shrink: 0;
    }

    /* ── CLIENTS ── */
    .clients {
      position: relative;
      z-index: 1;
      margin-top: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(28px, 5vw, 64px);
      flex-wrap: wrap;
      padding: 0 32px;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.22,1,0.36,1) 1.3s forwards;
    }

    .clients img {
      height: 28px;
      width: auto;
      object-fit: contain;
      opacity: 0.75;
      filter: brightness(0) invert(1);
      transition: opacity 0.2s ease;
    }

    /* Peak Serum has colour so let's keep it */
    .clients img.logo-peak {
      filter: none;
      opacity: 0.8;
    }

    .clients img:hover {
      opacity: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<section class="hero">

  <!-- Animated gradient orbs -->
  <div class="orb-wrap">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Main copy -->
  <div class="hero-content">
    <h1 class="hero-headline">More capacity. Less chaos.</h1>
    <p class="hero-sub">
      Freelance project manager for agencies and brands. I embed fast, create
      clarity, and make sure nothing falls through the cracks — so you don't have to.
    </p>

    <!-- CTA -->
    <a href="https://cal.com/christian-digitallee/15min" class="cta-btn" target="_blank" rel="noopener">
      <img
        src="Christian_Lee_logo_green_background.png"
        alt="Christian Lee"
        class="cta-avatar"
      />
      Book a call
    </a>
  </div>

  <!-- Client logos -->
  <div class="clients">
    <img src="pasqal_logo_1.png"                          alt="Pasqal" />
    <img src="Peak_Logo__1__1.png"                        alt="Peak Serum" class="logo-peak" />
    <img src="Group.png"                                  alt="Huawei" />
    <img src="logo-bemyapp-white_1.png"                   alt="BEMYAPP" />
    <img src="ActiveLoop-Logo_1__Vectorized__1.png"       alt="Activeloop" />
  </div>

</section>

</body>
</html>
