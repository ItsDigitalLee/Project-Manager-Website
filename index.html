<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Lee — More capacity. Less chaos.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --green: #00C870;
      --black: #000000;
      --white: #ffffff;
      --text-secondary: rgba(255,255,255,0.65);
    }

    html, body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .orb-wrap {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .blob-svg {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 380px;
      height: 250px;
      filter: blur(55px);
      opacity: 0;
      transition: opacity 2.2s ease;
    }

    .blob-svg.visible {
      opacity: 1;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px;
    }

    .hero-headline {
      font-family: 'Onest', sans-serif;
      font-weight: 700;
      font-size: clamp(2.6rem, 6vw, 4.6rem);
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(22px);
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
    }

    .hero-sub {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: clamp(0.95rem, 1.8vw, 1.125rem);
      line-height: 1.65;
      color: var(--text-secondary);
      max-width: 580px;
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.75s forwards;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--white);
      color: var(--black);
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      text-decoration: none;
      padding: 8px 22px 8px 8px;
      border-radius: 999px;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 1s forwards;
    }

    .cta-btn:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 32px rgba(0,200,112,0.3);
    }

    .cta-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      flex-shrink: 0;
    }

    .clients {
      position: relative;
      z-index: 1;
      margin-top: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(28px, 5vw, 64px);
      flex-wrap: wrap;
      padding: 0 32px;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.22,1,0.36,1) 1.3s forwards;
    }

    .clients img {
      height: 28px;
      width: auto;
      object-fit: contain;
      opacity: 0.75;
      filter: brightness(0) invert(1);
      transition: opacity 0.2s ease;
    }

    .clients img.logo-peak {
      filter: none;
      opacity: 0.85;
    }

    .clients img:hover {
      opacity: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<section class="hero">

  <div class="orb-wrap">
    <svg class="blob-svg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="blobGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#1FC379" />
          <stop offset="100%" stop-color="#98E6E1" />
        </linearGradient>
      </defs>
      <path id="blob1"
        d="M250,60 C380,20 500,80 470,220 C440,360 320,460 160,420 C0,380 20,200 80,100 C140,0 120,100 250,60Z"
        fill="url(#blobGrad)" opacity="1"
      />
      <path id="blob2"
        d="M280,50 C430,10 510,130 470,290 C430,450 260,490 90,430 C-80,370 20,160 110,60 C200,-40 130,90 280,50Z"
        fill="#98E6E1" opacity="0.6"
      />
    </svg>
  </div>

  <div class="hero-content">
    <h1 class="hero-headline">More capacity. Less chaos.</h1>
    <p class="hero-sub">
      Freelance project manager for agencies and brands. I embed fast, create
      clarity, and make sure nothing falls through the cracks — so you don't have to.
    </p>

    <a href="https://cal.com/christian-digitallee/15min" class="cta-btn" target="_blank" rel="noopener">
      <img src="Christian_Lee_logo_green_background.png" alt="Christian Lee" class="cta-avatar" />
      Book a call
    </a>
  </div>

  <div class="clients">
    <img src="pasqal_logo_1.png"                    alt="Pasqal" />
<img src="Peak_Logo (1) 1.png" alt="Peak Serum" class="logo-peak" style="height: 42px;" />    <img src="Group.png"                            alt="Huawei" />
    <img src="logo-bemyapp-white_1.png"             alt="BEMYAPP" />
    <img src="ActiveLoop-Logo_1__Vectorized__1.png" alt="Activeloop" />
  </div>

</section>

<script>
  const blob1 = document.getElementById('blob1');
  const blob2 = document.getElementById('blob2');
  const svgEl = document.querySelector('.blob-svg');

  // Fade in via class instead of CSS animation (no conflict)
  setTimeout(() => svgEl.classList.add('visible'), 300);

  const shapes1 = [
    "M250,60 C380,20 500,80 470,220 C440,360 320,460 160,420 C0,380 20,200 80,100 C140,0 120,100 250,60Z",
    "M300,40 C450,10 520,120 480,280 C440,440 280,480 120,430 C-40,380 10,180 90,80 C170,-20 150,70 300,40Z",
    "M200,80 C350,10 490,100 460,260 C430,420 260,470 100,420 C-60,370 30,170 100,70 C170,-30 50,150 200,80Z",
  ];

  const shapes2 = [
    "M280,50 C430,10 510,130 470,290 C430,450 260,490 90,430 C-80,370 20,160 110,60 C200,-40 130,90 280,50Z",
    "M230,70 C390,20 500,140 460,300 C420,460 240,500 70,440 C-100,380 15,150 100,50 C185,-50 70,120 230,70Z",
    "M320,30 C470,0 530,140 485,310 C440,480 250,510 80,450 C-90,390 10,170 105,55 C200,-60 170,60 320,30Z",
  ];

  function lerp(a, b, t) { return a + (b - a) * t; }
  function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
  function parsePath(d) { return d.match(/-?\d+\.?\d*/g).map(Number); }

  const template1 = shapes1[0];
  const template2 = shapes2[0];

  function rebuildPath(template, nums) {
    let i = 0;
    return template.replace(/-?\d+\.?\d*/g, () => Math.round(nums[i++]));
  }

  const parsed1 = shapes1.map(parsePath);
  const parsed2 = shapes2.map(parsePath);

  function interpolate(parsed, t) {
    const total = parsed.length;
    const scaled = t * total;
    const i = Math.floor(scaled) % total;
    const j = (i + 1) % total;
    const frac = easeInOut(scaled - Math.floor(scaled));
    return parsed[i].map((v, k) => lerp(v, parsed[j][k], frac));
  }

  const waypoints = [
    { x:   0, y:   0, r:  0 },
    { x: -70, y:   0, r: -8 },
    { x: -70, y: -80, r:-16 },
    { x:  10, y: -80, r:  0 },
    { x:  10, y: -10, r:  8 },
    { x:   0, y:   0, r:  0 },
  ];

  const CYCLE = 12000;

  function getWaypoint(ts) {
    const progress = (ts % CYCLE) / CYCLE;
    const total = waypoints.length - 1;
    const scaled = progress * total;
    const i = Math.min(Math.floor(scaled), total - 1);
    const j = i + 1;
    const frac = easeInOut(scaled - i);
    return {
      x: lerp(waypoints[i].x, waypoints[j].x, frac),
      y: lerp(waypoints[i].y, waypoints[j].y, frac),
      r: lerp(waypoints[i].r, waypoints[j].r, frac),
    };
  }

  let t1 = 0;
  let t2 = 0.4;
  const speed1 = 0.0008;
  const speed2 = 0.0005;

  function tick(ts) {
    t1 = (t1 + speed1) % 1;
    t2 = (t2 + speed2) % 1;

    blob1.setAttribute('d', rebuildPath(template1, interpolate(parsed1, t1)));
    blob2.setAttribute('d', rebuildPath(template2, interpolate(parsed2, t2)));

    const { x, y, r } = getWaypoint(ts);
    svgEl.style.transform = `translate(calc(-50% + ${x}px), calc(-62% + ${y}px)) rotate(${r}deg)`;
    const pulse = 0.55 + Math.sin(ts * 0.0004) * 0.2;
svgEl.style.opacity = pulse;

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
</script>

</body>
</html>
